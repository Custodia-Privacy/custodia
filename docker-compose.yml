services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: custodia-app
    restart: unless-stopped
    networks:
      - custodia
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: custodia-scanner
    restart: unless-stopped
    networks:
      - custodia
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
    shm_size: 512m
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('ioredis');new r(process.env.REDIS_URL||'redis://redis:6379').ping().then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: custodia-postgres
    restart: unless-stopped
    networks:
      - custodia
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-custodia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-custodia_dev}
      POSTGRES_DB: ${POSTGRES_DB:-custodia}
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-custodia} -d ${POSTGRES_DB:-custodia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: custodia-redis
    restart: unless-stopped
    networks:
      - custodia
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-custodia_redis_dev} --maxmemory 200mb --maxmemory-policy noeviction
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-custodia_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  custodia:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
